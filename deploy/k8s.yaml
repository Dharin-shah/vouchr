# Reference manifest for the standalone headless Vouchr broker. This is a SHAPE to adapt to your
# platform (Helm/Kustomize/meta-chart), not a drop-in — replace the image, the Secret source, and
# the ServiceAccount with your own. No registry, IAM ARN, or vendor annotation is hardcoded.
#
# Vouchr is PostgreSQL-only. Two DB credentials are used:
#   - the migrate Job (below) runs `vouchr migrate` ONCE per deploy/upgrade with a SCHEMA-OWNER role
#     (can CREATE/ALTER tables) to create/converge the schema;
#   - the Deployment runtime connects with a DML-only role (SELECT/INSERT/UPDATE/DELETE only, no
#     CREATE) and never creates tables — it fails closed if the DB has not been migrated.
# See guides/DEPLOYMENT.md § Migrations for the two roles and the GRANT statements.
#
# Multi-replica is safe because the broker runs on Postgres with the shared DbReplayStore
# (identity-token jti is single-use cluster-wide) and all replicas share one migrated database.
apiVersion: batch/v1
kind: Job
metadata:
  name: vouchr-migrate
  labels: { app: vouchr-broker }
  # Run this to completion BEFORE the Deployment rolls out (a Helm pre-upgrade/pre-install hook, an
  # Argo PreSync hook, or `kubectl apply` this Job first). `vouchr migrate` is idempotent and
  # advisory-locked, so re-running it or racing concurrent runs is safe.
  # annotations: { "helm.sh/hook": pre-install,pre-upgrade, "helm.sh/hook-weight": "-1" }
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: { app: vouchr-broker }
    spec:
      restartPolicy: Never
      # The image runs as a numeric non-root user (Dockerfile `USER 1000:1000`), so the kubelet
      # verifies non-root without a pinned UID. A Restricted platform that assigns a namespace UID
      # range overrides runAsUser here with its own; do not hardcode one (#216 arbitrary-numeric-user).
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: migrate
          image: REPLACE_ME/vouchr-broker:latest # SAME image/tag as the Deployment below
          command: ["node", "dist/bin/vouchr.js", "migrate"]
          # This env carries the SCHEMA-OWNER VOUCHR_DATABASE_URL (a role that can CREATE tables) —
          # a DIFFERENT Secret from the runtime's DML-only credential below.
          envFrom:
            - secretRef: { name: vouchr-migrate }
          # Container-level Restricted Pod Security controls — required alongside the pod-level
          # settings for the `restricted` policy to admit this Job (kubernetes.io Pod Security
          # Standards). Matches the runtime container below.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "128Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vouchr-broker
  labels: { app: vouchr-broker }
spec:
  replicas: 2 # safe on Postgres: all replicas share one migrated DB + the shared jti replay table
  selector:
    matchLabels: { app: vouchr-broker }
  template:
    metadata:
      labels: { app: vouchr-broker }
    spec:
      # For KMS via IRSA / workload identity, bind a ServiceAccount here; the AWS SDK default
      # credential chain then works with zero code. Create the SA out-of-band with your IAM role.
      # serviceAccountName: vouchr-broker
      # The image runs as a numeric non-root user (Dockerfile `USER 1000:1000`), so the kubelet can
      # verify runAsNonRoot from the image config alone — no manifest UID is pinned, letting a
      # Restricted platform assign an arbitrary UID from its namespace range (#216).
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: broker
          image: REPLACE_ME/vouchr-broker:latest # pin to your registry + immutable tag
          ports:
            - { name: http, containerPort: 3000 }
          # Secrets (VOUCHR_IDENTITY_SECRET, optional VOUCHR_IDENTITY_SECRET_PREVIOUS,
          # VOUCHR_MASTER_KEY, VOUCHR_DATABASE_URL, provider client secrets, optional
          # VOUCHR_BROKER_TOKEN) come from a Secret your secret manager syncs (e.g.
          # externalSecrets → this Secret). Keep identity keys distinct from every other secret.
          # Non-secret deployment identity/issuer can come from a ConfigMap or explicit env below.
          # This VOUCHR_DATABASE_URL is the DML-only runtime credential (no CREATE) — distinct from
          # the schema-owner URL the vouchr-migrate Job uses. Put sslmode=require in the URL for TLS;
          # size the pool with VOUCHR_PG_POOL_MAX (a positive integer) if pg's default doesn't fit.
          # Connection budget: each replica uses up to VOUCHR_PG_POOL_MAX (application_name=vouchr)
          # PLUS a lazily-opened refresh pool of up to 4 (application_name=vouchr-refresh) — so plan
          # for (VOUCHR_PG_POOL_MAX + 4) * replicas against your Postgres max_connections.
          envFrom:
            - secretRef: { name: vouchr-broker }
          env:
            - { name: VOUCHR_PORT, value: "3000" }
            # REQUIRED on every broker replica and trusted minter; replace with one stable id for this
            # deployment. Changing it invalidates every in-flight assertion from the previous id.
            - { name: VOUCHR_DEPLOYMENT_ID, value: "" } # intentionally fails closed until set
            # Optional; defaults to "vouchr" and must match every trusted minter.
            # - { name: VOUCHR_IDENTITY_ISSUER, value: "vouchr" }
            # Recommended for multi-instance / production: Postgres (VOUCHR_DATABASE_URL) AND a KMS
            # envelope. To enable KMS, uncomment VOUCHR_KMS_KEY_ID AND add @aws-sdk/client-kms to the
            # image (see Dockerfile) together. Vouchr does not enforce this — the host decides.
            # - { name: VOUCHR_KMS_KEY_ID, value: "<kms-key-arn>" }
            # - { name: VOUCHR_PROVIDERS_FILE, value: "/etc/vouchr/providers.json" }
            # Static provider-by-channel policy is optional. Use exactly ONE of VOUCHR_POLICY
            # (inline JSON) or VOUCHR_POLICY_FILE; setting both fails startup instead of merging.
            # Provider rule ids must exist in the configured provider file. defaultDeny: true with
            # zero rules is a valid deny-all lockdown and emits a startup warning.
            # - { name: VOUCHR_POLICY_FILE, value: "/etc/vouchr/policy.json" }
          # Pair VOUCHR_POLICY_FILE with a read-only ConfigMap mount (and define the commented
          # pod-level volume below). Keep provider and policy artifacts versioned together.
          # volumeMounts:
          #   - { name: vouchr-policy, mountPath: /etc/vouchr/policy.json, subPath: policy.json,
          #       readOnly: true }
          # Readiness hits /readyz (schema + shared replay-store checks) so a pod drains from the
          # Service when Postgres or replay protection is unusable. Liveness hits /healthz (a bare
          # process-serving check, no DB) — a DB blip must NOT restart the whole fleet.
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "256Mi" }
      # volumes:
      #   - name: vouchr-policy
      #     configMap: { name: vouchr-policy }
---
apiVersion: v1
kind: Service
metadata:
  name: vouchr-broker
  labels: { app: vouchr-broker }
spec:
  selector: { app: vouchr-broker }
  ports:
    - { name: http, port: 80, targetPort: http }
