name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '27 4 * * 1'

# Superseded PR runs auto-cancel (the scheduled scan is unaffected — distinct ref).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Blocking PR gate: a PR that introduces a high+ advisory red-X's here.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    # gitleaks-action lists PR commits via the API; needs pull-requests: read
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE: org-level scanning needs one, but plain repo
          # scans run free with the default ruleset.

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Non-blocking: generate a CycloneDX SBOM and publish it as an artifact.
      - name: Generate SBOM
        run: npx -y @cyclonedx/cyclonedx-npm --output-file sbom.json
        continue-on-error: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: warn

  owasp-dependency-check:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        with:
          project: Vouchr
          path: .
          format: HTML
          out: reports/dependency-check
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude **/node_modules/**
            --exclude **/dist/**
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: owasp-dependency-check
          path: reports/dependency-check
          if-no-files-found: warn
