name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '27 4 * * 1'

# Superseded PR runs auto-cancel (the scheduled scan is unaffected — distinct ref).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Blocking PR gate: a PR that introduces a high+ advisory red-X's here.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    # gitleaks-action lists PR commits via the API; needs pull-requests: read
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE: org-level scanning needs one, but plain repo
          # scans run free with the default ruleset.

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Non-blocking: generate a CycloneDX SBOM and publish it as an artifact.
      - name: Generate SBOM
        run: npx -y @cyclonedx/cyclonedx-npm --output-file sbom.json
        continue-on-error: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: warn

  # Blocking gate on PRs and main (#180): a dependency with a CVSS >= 7 NVD/KEV/RetireJS finding
  # red-X's here. CVE data comes baked into the action's base image (rebuilt regularly upstream;
  # the SHA pin fixes the entrypoint, not the scanner image), which is why the action runs the
  # CLI with --noupdate.
  owasp-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      # The Node Package Analyzer resolves the packages actually installed; without node_modules
      # it warns and the scan is near-empty (green != scanned — the original #180 bug).
      - run: npm ci
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        with:
          project: Vouchr
          path: .
          format: HTML
          out: reports/dependency-check
          # Caveat: the action's entrypoint expands this string UNQUOTED (all_args=$@), so it only
          # parses via shell word-splitting — no values with spaces, and the `**` excludes survive
          # only while nothing in the workspace glob-matches them. Verified against the pinned SHA.
          # npm audit is already a separate blocking job above. Disable Dependency-Check's duplicate
          # network analyzer so an npm Audit API outage cannot fail a completed NVD/KEV/RetireJS scan.
          args: >
            --failOnCVSS 7
            --enableRetired
            --disableOssIndex
            --disableNodeAudit
            --exclude **/node_modules/**
            --exclude **/dist/**
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: owasp-dependency-check
          path: reports/dependency-check
          if-no-files-found: warn
