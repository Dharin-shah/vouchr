name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Non-blocking: surfaces high/critical advisories without red-X'ing the build
      # for transitive issues we can't immediately fix.
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE: org-level scanning needs one, but plain repo
          # scans run free with the default ruleset.

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Non-blocking: generate a CycloneDX SBOM and publish it as an artifact.
      - name: Generate SBOM
        run: npx -y @cyclonedx/cyclonedx-npm --output-file sbom.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: warn
