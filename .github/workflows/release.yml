name: Release

# Publishes on a version tag (e.g. v0.1.0-rc.1): the `vouchr` npm library (primary artifact) and a
# GHCR broker image (quick-start). npm publish needs an NPM_TOKEN repo secret; GHCR uses GITHUB_TOKEN.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# A publish must NEVER be cancelled mid-flight, so this group does NOT cancel-in-progress: concurrent
# tag pushes queue and run to completion one at a time instead of racing or aborting a partial publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # npm provenance
  packages: write   # GHCR push

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Build before test so dist/ exists for artifact-inspecting tests (see ci.yml).
      - run: npm run build
      - run: npm test

  npm-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      # Prerelease tags (a semver `-` suffix, e.g. v0.2.0-rc.1) publish under the `rc` dist-tag so they
      # never become the default `npm install` target; stable tags publish as `latest`. This overrides
      # publishConfig.tag per-release. Provenance signs the release.
      - name: npm publish
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then TAG=rc; else TAG=latest; fi
          echo "publishing ${GITHUB_REF_NAME} under dist-tag ${TAG}"
          npm publish --provenance --tag "${TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-ghcr:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/vouchr-broker
          tags: |
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
