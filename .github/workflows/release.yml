name: Release

# Publishes on a version tag (e.g. v0.1.0-rc.1): the `vouchr` npm library (primary artifact) and a
# GHCR broker image (quick-start). npm publish needs an NPM_TOKEN repo secret; GHCR uses GITHUB_TOKEN.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # npm provenance
  packages: write   # GHCR push

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  npm-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # Trusted Publishing (OIDC) — no npm token. Auth comes from the workflow's id-token; the
      # @vouchr/core package must have this repo+workflow configured as a Trusted Publisher on npm.
      # Needs npm >= 11.5.1 (Node 22 ships 10.x), and provenance is generated automatically.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish

  docker-ghcr:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vouchr-broker
          tags: |
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
