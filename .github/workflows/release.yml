name: Release

# Publishes on a version tag (e.g. v0.1.0-rc.1): the `vouchr` npm library (primary artifact) and a
# GHCR broker image (quick-start). npm publish needs an NPM_TOKEN repo secret; GHCR uses GITHUB_TOKEN.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# A publish must NEVER be cancelled mid-flight, so this group does NOT cancel-in-progress: concurrent
# tag pushes queue and run to completion one at a time instead of racing or aborting a partial publish.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # npm provenance + cosign keyless image signing (Fulcio)
  packages: write   # GHCR push

jobs:
  verify:
    runs-on: ubuntu-latest
    # Vouchr is PostgreSQL-only, so `npm test` (the real-PG suite) needs a live Postgres — mirror the
    # service + VOUCHR_TEST_PG_URL that ci.yml uses. Without it the suite has no DB and the release
    # can't pass. Container-only; there is no offline/PGlite tier.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vouchr
          POSTGRES_PASSWORD: vouchr
          POSTGRES_DB: vouchr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vouchr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      VOUCHR_TEST_PG_URL: postgres://vouchr:vouchr@localhost:5432/vouchr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Gate BEFORE any publish (verify precedes every publish job): npm/GHCR are irreversible. Hard-
      # fail unless the ref is a v* tag — a workflow_dispatch from a branch would otherwise skip the
      # version logic and publish `main`. Then require a matching CHANGELOG section. A manual re-run is
      # still fine as long as it targets a tag. github-release re-extracts the same section to publish.
      # Also require tag == package.json version: npm publishes whatever package.json says, so a
      # mismatched tag would ship one version under another's name/Release notes.
      - name: Guard — release only from a v* tag matching package.json, with a CHANGELOG entry
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "::error::release publishes only from a v* tag (got $GITHUB_REF); a manual dispatch must target a tag, not a branch"; exit 1 ;;
          esac
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          [ "$PKG_VERSION" = "$VERSION" ] \
            || { echo "::error::tag v$VERSION does not match package.json version $PKG_VERSION — bump package.json before tagging"; exit 1; }
          awk -v ver="$VERSION" 'index($0,"## ["ver"]")==1{g=1;next} g&&/^## /{g=0} g{print}' CHANGELOG.md | grep -q . \
            || { echo "::error::no CHANGELOG section for $VERSION — add a '## [$VERSION]' entry before tagging"; exit 1; }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Build before test so dist/ exists for artifact-inspecting tests (see ci.yml).
      - run: npm run build
      - run: npm test

  npm-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      # Dist-tag policy (overrides publishConfig.tag per-release; provenance signs the release):
      #  - an in-progress prerelease (`-rc`/`-alpha`) publishes under `rc` so it never becomes the
      #    default `npm install` target;
      #  - a `-beta` release IS the recommended install for the beta line, so it publishes as `latest`;
      #  - a stable tag publishes as `latest`.
      - name: npm publish
        run: |
          case "${GITHUB_REF_NAME}" in
            *-rc*|*-alpha*) TAG=rc ;;
            *)              TAG=latest ;;
          esac
          echo "publishing ${GITHUB_REF_NAME} under dist-tag ${TAG}"
          npm publish --provenance --tag "${TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build + boot the image and prove it serves /healthz BEFORE it can be pushed to GHCR — a broken
  # Dockerfile must never reach the registry. Same script CI runs on docker-touching PRs.
  docker-smoke:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: npm run docker-smoke

  docker-ghcr:
    needs: [verify, docker-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/vouchr-broker
          tags: |
            type=semver,pattern={{version}}
            type=sha
      # provenance mode=max embeds full BuildKit SLSA provenance. Enabling attestations makes the
      # pushed artifact an OCI image index (even single-platform), so outputs.digest below is the
      # top-level INDEX digest — if this image ever goes multi-platform, keep signing that index
      # digest, never the per-arch manifest digests.
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
      # Everything below works on the immutable name@digest ref, never a mutable tag. The name comes
      # from the first meta tag: registry refs must be lowercase, github.repository_owner isn't, and
      # metadata-action already owns the lowercased image name.
      - name: Resolve pushed image ref (name@digest)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "IMAGE_REF=$(head -n1 <<<"$TAGS" | cut -d: -f1)@$DIGEST" >> "$GITHUB_ENV"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_REF }}
          format: cyclonedx-json
          output-file: sbom-image.cdx.json
          # the SBOM ships only as a registry attestation — not a workflow artifact or release asset
          upload-artifact: false
          upload-release-assets: false
      # Keyless signing: Fulcio binds the signature to this job's OIDC identity — this repo's
      # release.yml running on a v* tag ref (needs the workflow-level id-token: write). Then gate the
      # release on the exact verification guides/DEPLOYMENT.md tells deployers to run: if a deployer's
      # `cosign verify` wouldn't succeed, the release fails here instead of shipping unverifiable.
      - name: cosign sign + attest SBOM, then verify (release gate)
        run: |
          cosign sign --yes "$IMAGE_REF"
          cosign attest --yes --type cyclonedx --predicate sbom-image.cdx.json "$IMAGE_REF"
          CERT_ID="^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@refs/tags/v"
          cosign verify --certificate-identity-regexp "$CERT_ID" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com "$IMAGE_REF"
          cosign verify-attestation --type cyclonedx --certificate-identity-regexp "$CERT_ID" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com "$IMAGE_REF"

  # After the artifacts publish, cut the GitHub Release from the CHANGELOG so the notes match exactly
  # what shipped, and attach the SBOM. Fails loudly if the tag has no CHANGELOG section (forces the
  # changelog to be updated before a release). Prerelease tags (semver `-` suffix) are marked as such.
  github-release:
    needs: [npm-publish, docker-ghcr]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx -y @cyclonedx/cyclonedx-npm --output-file sbom.json
      - name: Create GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" 'index($0,"## ["ver"]")==1{g=1;next} g&&/^## /{g=0} g{print}' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG section for $VERSION — add a '## [$VERSION]' entry before tagging"; exit 1
          fi
          FLAGS=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then FLAGS="--prerelease"; fi
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md $FLAGS sbom.json
