name: Release

# Publishes on a version tag (e.g. v0.1.0-rc.1): the `vouchr` npm library (primary artifact) and a
# GHCR broker image (quick-start). npm publish needs an NPM_TOKEN repo secret; GHCR uses GITHUB_TOKEN.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # npm provenance
  packages: write   # GHCR push

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Build before test so dist/ exists for artifact-inspecting tests (see ci.yml).
      - run: npm run build
      - run: npm test

  npm-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      # Prerelease tags (a semver `-` suffix, e.g. v0.2.0-rc.1) publish under the `rc` dist-tag so they
      # never become the default `npm install` target; stable tags publish as `latest`. This overrides
      # publishConfig.tag per-release. Provenance signs the release.
      - name: npm publish
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then TAG=rc; else TAG=latest; fi
          echo "publishing ${GITHUB_REF_NAME} under dist-tag ${TAG}"
          npm publish --provenance --tag "${TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-ghcr:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vouchr-broker
          tags: |
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
