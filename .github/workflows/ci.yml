name: CI

on:
  push:
    branches: [main]
  pull_request:

# Superseded PR runs auto-cancel so pushes don't pile up burning minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # engines says node >=22, so validate the current + next major consumers actually run on.
      matrix:
        node: [22, 24]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vouchr
          POSTGRES_PASSWORD: vouchr
          POSTGRES_DB: vouchr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vouchr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Exercises the real Postgres backend (the suite skips PG if this is unreachable).
      VOUCHR_TEST_PG_URL: postgres://vouchr:vouchr@localhost:5432/vouchr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # Build BEFORE test: the compiled dist/ must exist for tests that inspect the shipped artifact
      # (e.g. the headless @slack-free module-graph check), and an emit/declaration break fails fast here.
      - run: npm run build
      - run: npm test

  # Exercises the PUBLISHED artifact (pack → install into a fresh project → resolve every
  # entrypoint/bin/type). Separate job: a packaging break is distinct from a test failure, and it
  # needs no Postgres. ~30s.
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run pack-smoke

  # better-sqlite3 is a native module and library consumers develop on macOS/Windows. Validate the
  # package installs + builds there. Build-only (no full suite — the PG-skip logic makes it low-value
  # off Linux, and this is just guarding the native rebuild + a bare sqlite smoke).
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node -e "require('better-sqlite3')(':memory:').exec('select 1')"
